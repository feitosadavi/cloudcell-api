services:
  bot:
    build: .
    container_name: chatwoot-gemini-bot
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - .:/app
      - bot_data:/app/data # volume nomeado — Docker gerencia, sem problema de permissão

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
volumes:
  bot_data: # volume nomeado persistente — sobrevive a restarts e rebuilds
